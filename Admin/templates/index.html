{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{% static 'css/main.css'%}">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h4 class="text-center">My Dashboard</h4>
            <a href="#">Home</a>
            <a href="{% url 'add_record' %}">Add Record</a>
            <a href="#">Manage Records</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>
        </div>

        <!-- Main content -->
        <div class="col-md-9 col-lg-10 content">
            <h2>Welcome to Your Dashboard</h2>
            <p>Use this dashboard to manage your CRUD operations easily.</p>

            <!-- Example Table -->
            <div class="card mt-4">
                <div class="card-header">
                    Student Records
                    <a href="{% url 'add_record' %}" class="btn btn-primary btn-sm float-end">Add New</a>
                </div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Age</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>1</td>
                            <td>John Doe</td>
                            <td>Computer Science</td>
                            <td>21</td>
                            <td>
                                <a href="#" class="btn btn-sm btn-warning">Edit</a>
                                <a href="#" class="btn btn-sm btn-danger">Delete</a>
                            </td>
                        </tr>
                        <!-- Add more rows dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
